<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worksthal Logo — Download PNG</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: #e4e4e7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #fff; }
  .sub { font-size: 13px; color: #71717a; margin-bottom: 40px; }
  .preview {
    background: #0a0a0a;
    border: 1px solid #27272a;
    border-radius: 16px;
    padding: 48px;
    margin-bottom: 32px;
  }
  canvas { display: block; image-rendering: auto; }
  .buttons {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  }
  button {
    font-family: 'Inter', sans-serif;
    padding: 12px 28px;
    border: 1px solid #27272a;
    border-radius: 10px;
    background: #18181b;
    color: #e4e4e7;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  button:hover { background: #27272a; border-color: #3f3f46; color: #fff; }
  button.primary {
    background: #fff;
    color: #0a0a0a;
    border-color: #fff;
  }
  button.primary:hover { background: #e4e4e7; }
  .note {
    margin-top: 32px;
    font-size: 11px;
    color: #52525b;
    text-align: center;
    max-width: 420px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<h1>Worksthal Gradient Logo</h1>
<p class="sub">Click a size to download as PNG</p>

<div class="preview">
  <canvas id="preview" width="200" height="200"></canvas>
</div>

<div class="buttons">
  <button onclick="downloadPNG(128)">128 &times; 128</button>
  <button onclick="downloadPNG(256)">256 &times; 256</button>
  <button onclick="downloadPNG(512)">512 &times; 512</button>
  <button class="primary" onclick="downloadPNG(1200)">1200 &times; 1200</button>
  <button onclick="downloadPNG(2048)">2048 &times; 2048</button>
  <button onclick="downloadPNG(4096)">4096 &times; 4096</button>
</div>

<p class="note">All exports are transparent-free with the dark background baked in. The 1200&times;1200 size is recommended for most platforms (Google Business, social media, etc.).</p>

<script>
function drawLogo(ctx, size) {
  const s = size / 512;
  ctx.clearRect(0, 0, size, size);

  // Rounded rectangle background
  const r = 96 * s;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#0A0A0A';
  ctx.fill();

  // W path with gradient
  const grad = ctx.createLinearGradient(256 * s, 140 * s, 256 * s, 388 * s);
  grad.addColorStop(0, '#FFFFFF');
  grad.addColorStop(1, '#71717A');

  ctx.beginPath();
  ctx.moveTo(116 * s, 152 * s);
  ctx.lineTo(196 * s, 380 * s);
  ctx.lineTo(256 * s, 212 * s);
  ctx.lineTo(316 * s, 380 * s);
  ctx.lineTo(396 * s, 152 * s);
  ctx.lineTo(348 * s, 152 * s);
  ctx.lineTo(300 * s, 336 * s);
  ctx.lineTo(256 * s, 240 * s);
  ctx.lineTo(212 * s, 336 * s);
  ctx.lineTo(164 * s, 152 * s);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Dot accent
  ctx.beginPath();
  ctx.arc(384 * s, 356 * s, 14 * s, 0, Math.PI * 2);
  ctx.fillStyle = '#3F3F46';
  ctx.fill();
}

// Preview
const preview = document.getElementById('preview');
const pCtx = preview.getContext('2d');
drawLogo(pCtx, 200);

function downloadPNG(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  drawLogo(ctx, size);

  const link = document.createElement('a');
  link.download = 'worksthal-logo-' + size + 'x' + size + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
